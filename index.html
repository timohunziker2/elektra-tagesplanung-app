<title>Elektra Ins – Einsatzplan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --bg4:#2a2f45;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#e8eaf0; --text2:#9aa0b8; --text3:#6b7291;
  --accent:#cc1418; --accent2:#a50f12;
  --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
  --green-bg:rgba(34,197,94,0.20); --yellow-bg:rgba(234,179,8,0.60);
  --red-bg:rgba(239,68,68,0.60); --blue-bg:rgba(59,130,246,0.60);
  --radius:10px; --radius-lg:14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif; color: var(--text); font-size: 14px; }
.shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.header { background: #111318; border-bottom: 2px solid var(--accent); padding: calc(var(--safe-top) + 10px) 16px 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header-logo { height: 34px; width: auto; }
.header-title { flex: 1; }
.header-title h1 { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
.header-title p { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background .3s; }
.sync-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.offline { background: var(--red); }
.tabbar { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; text-transform: uppercase; letter-spacing: 0.5px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 16px); }
.date-nav { display: flex; align-items: center; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 10; }
.date-nav-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; padding: 8px 14px; border-radius: var(--radius); font-size: 16px; transition: all .15s; flex-shrink: 0; }
.date-nav-btn:active { background: var(--bg4); }
.date-info { flex: 1; text-align: center; }
.date-day { font-size: 16px; font-weight: 700; }
.date-full { font-size: 12px; color: var(--text3); margin-top: 1px; }
.date-today-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; }
.plan-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.site-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.site-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.site-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(204,20,24,0.15); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.site-name { font-size: 15px; font-weight: 700; flex: 1; }
.vehicle-pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); white-space: nowrap; }
.site-workers { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
.worker-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.worker-chip.full { background: rgba(234,179,8,0.2); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
.worker-chip.x1 { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
.worker-chip.x2 { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
.worker-badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.1); }
.empty-state { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.empty-text { font-size: 13px; color: var(--text3); line-height: 1.5; }
.absent-section { margin: 0 12px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.absent-header { padding: 10px 14px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); }
.absent-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
.absent-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.absent-chip.absent { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.absent-chip.school { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
.absent-chip.half { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(234,179,8,0.25); }
.emp-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.emp-search-wrap { padding: 12px 12px 8px; position: sticky; top: 0; background: var(--bg); z-index: 5; }
.emp-search-inner { position: relative; }
.emp-search { width: 100%; padding: 10px 14px 10px 38px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; }
.emp-search:focus { border-color: var(--accent); }
.emp-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); }
.emp-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .1s; }
.emp-row:active { background: var(--bg3); }
.emp-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
.emp-row-info { flex: 1; min-width: 0; }
.emp-row-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.emp-row-today { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.status-badge.working { background: var(--green-bg); color: var(--green); }
.status-badge.absent { background: var(--red-bg); color: var(--red); }
.status-badge.school { background: var(--blue-bg); color: var(--blue); }
.status-badge.half { background: var(--yellow-bg); color: var(--yellow); }
.emp-detail { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; flex-direction: column; }
.emp-detail.open { display: flex; }
.emp-detail-header { background: #111318; border-bottom: 2px solid var(--accent); padding: calc(var(--safe-top) + 10px) 16px 12px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.back-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); padding: 7px 12px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
.emp-detail-name { flex: 1; font-size: 16px; font-weight: 700; }
.emp-detail-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; padding-bottom: calc(var(--safe-bottom) + 20px); }
.week-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); padding: 8px 4px 6px; }
.day-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.day-row.today-row { border-color: var(--accent); }
.day-date { min-width: 44px; }
.day-dow { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; }
.day-num { font-size: 18px; font-weight: 700; line-height: 1.1; }
.day-row.today-row .day-num { color: var(--accent); }
.day-content { flex: 1; min-width: 0; }
.day-site { font-size: 14px; font-weight: 600; }
.day-vehicle { font-size: 12px; color: var(--text3); margin-top: 2px; }
.day-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.day-tag.full { background: rgba(234,179,8,0.2); color: var(--yellow); }
.day-tag.x1 { background: var(--green-bg); color: var(--green); }
.day-tag.x2 { background: var(--blue-bg); color: var(--blue); }
.day-tag.absent { background: var(--red-bg); color: var(--red); }
.day-tag.school { background: var(--blue-bg); color: var(--blue); }
.day-tag.half { background: var(--yellow-bg); color: var(--yellow); }
.no-assignment { color: var(--text3); font-size: 13px; font-style: italic; }
.loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 999; }
.loader img { height: 56px; }
.loader-spinner { width: 32px; height: 32px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
.loader-text { font-size: 13px; color: var(--text2); }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { display: none; }
</style>
</head>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR_zR1xGUBOFWB4_14yK5yeIlC54VHAHo",
  authDomain: "elektra-tagesplanung-23b62.firebaseapp.com",
  databaseURL: "https://elektra-tagesplanung-23b62-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "elektra-tagesplanung-23b62",
  storageBucket: "elektra-tagesplanung-23b62.firebasestorage.app",
  messagingSenderId: "1026963459245",
  appId: "1:1026963459245:web:6a5aeaed0afd8ade37ca24"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLORS = ['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#14b8a6','#84cc16','#f97316','#a855f7','#0ea5e9','#22c55e','#eab308','#e11d48','#7c3aed','#059669','#d97706','#2563eb','#dc2626'];

let state = { tab: 'plan', selectedDate: new Date(), employees: [], vehicles: [], plans: {} };
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}

db.ref('settings').on('value', snap => {
  const s = snap.val();
  if (s) { if (s.employees) state.employees = s.employees; if (s.vehicles) state.vehicles = s.vehicles; if (s.inactiveEmployees) state.inactiveEmployees = s.inactiveEmployees; }
  render();
});
db.ref('plans').on('value', snap => { state.plans = snap.val() || {}; render(); });
db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('syncDot');
  if (dot) dot.className = 'sync-dot ' + (snap.val() ? 'online' : 'offline');
});

setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  render();
}, 1000);

function setTab(t) {
  state.tab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  render();
}
function render() { if (state.tab === 'plan') renderPlan(); else renderEmployees(); }

function renderPlan() {
  const d = state.selectedDate;
  const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const isToday = dateKey(d) === dateKey(new Date());
  const plan = state.plans[dateKey(d)] || { sites: [], globalStatus: {} };

  const specialEmps = state.employees.filter(e => plan.globalStatus && plan.globalStatus[e]);
  const absentChips = specialEmps.map(e => {
    const gs = plan.globalStatus[e];
    const label = gs==='absent'?'Abwesend':gs==='school'?'Schule':'Halbtags';
    return '<div class="absent-chip ' + gs + '">' + e + ' <span style="opacity:.7;font-size:10px">' + label + '</span></div>';
  }).join('');

  const sites = (plan.sites || []).filter(s => s.name);
  const siteCards = sites.map(site => {
    const vName = site.vehicle ? (state.vehicles[site.vehicle-1] || '—') : '—';
    const workers = Object.entries(site.assignments || {}).map(([emp, mark]) => {
      const cls = mark==='X1'?'x1':mark==='X2'?'x2':'full';
      return '<div class="worker-chip ' + cls + '"><span>' + emp + '</span><span class="worker-badge">' + mark + '</span></div>';
    }).join('');
    return '<div class="site-card"><div class="site-card-header"><div class="site-icon">🏗</div><div class="site-name">' + site.name + '</div><div class="vehicle-pill">🚐 ' + vName + '</div></div>' + (workers ? '<div class="site-workers">' + workers + '</div>' : '<div style="padding:8px 14px;font-size:12px;color:var(--text3)">Keine Mitarbeiter eingeteilt</div>') + '</div>';
  }).join('');

  document.getElementById('mainContent').innerHTML =
    '<div class="date-nav"><button class="date-nav-btn" onclick="changeDay(-1)">‹</button><div class="date-info"><div class="date-day">' + DAYS[d.getDay()] + '</div><div class="date-full">' + d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() + '</div></div><button class="date-nav-btn" onclick="changeDay(1)">›</button></div>' +
    (!isToday ? '<div style="text-align:center;padding:8px"><button class="date-today-btn" onclick="goToday()">Heute</button></div>' : '') +
    (specialEmps.length > 0 ? '<div class="absent-section"><div class="absent-header">Status heute</div><div class="absent-chips">' + absentChips + '</div></div>' : '') +
    '<div class="plan-list">' + (sites.length > 0 ? siteCards : '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Kein Plan vorhanden</div><div class="empty-text">Für diesen Tag wurde noch kein Einsatzplan erstellt.</div></div>') + '</div>';
}

function changeDay(dir) { const d = new Date(state.selectedDate); d.setDate(d.getDate()+dir); state.selectedDate = d; render(); }
function goToday() { state.selectedDate = new Date(); render(); }

function renderEmployees(filter) {
  filter = filter || '';
  const activeEmps = state.employees.filter(e => !(state.inactiveEmployees||[]).includes(e));
  const emps = filter ? activeEmps.filter(e => e.toLowerCase().includes(filter.toLowerCase())) : activeEmps;
  const plan = state.plans[dateKey(new Date())] || { sites: [], globalStatus: {} };
  const rows = emps.map(emp => {
    const i = state.employees.indexOf(emp);
    const col = COLORS[i % COLORS.length];
    const init = emp.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const gs = (plan.globalStatus && plan.globalStatus[emp]) || '';
    const statusLabel = gs==='absent'?'Abwesend':gs==='school'?'Schule':gs==='half'?'Halbtags':'Anwesend';
    const statusCls = gs==='absent'?'absent':gs==='school'?'school':gs==='half'?'half':'working';
    let todayText = 'Kein Einsatz heute';
    (plan.sites||[]).forEach(site => {
      if (site.assignments && site.assignments[emp]) {
        const vName = site.vehicle ? (state.vehicles[site.vehicle-1]||'') : '';
        const mark = site.assignments[emp];
        todayText = site.name + (vName?' · '+vName:'') + (mark!=='X'?' ('+(mark==='X1'?'VM':'NM')+')':'');
      }
    });
    return '<div class="emp-row" onclick="openDetail(\'' + emp.replace(/'/g,"\\'") + '\')"><div class="emp-avatar" style="background:' + col + '33;color:' + col + '">' + init + '</div><div class="emp-row-info"><div class="emp-row-name">' + emp + '</div><div class="emp-row-today">' + todayText + '</div></div><div class="status-badge ' + statusCls + '">' + statusLabel + '</div></div>';
  }).join('');
  document.getElementById('mainContent').innerHTML =
    '<div class="emp-search-wrap"><div class="emp-search-inner"><span class="emp-search-icon">🔍</span><input class="emp-search" placeholder="Mitarbeiter suchen…" oninput="renderEmployees(this.value)" value="' + filter + '"></div></div>' +
    '<div class="emp-list">' + (rows || '<div class="empty-state"><div class="empty-icon">👷</div><div class="empty-title">Niemand gefunden</div></div>') + '</div>';
}

function openDetail(emp) {
  const i = state.employees.indexOf(emp);
  const col = COLORS[i % COLORS.length];
  const today = new Date();
  const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const todayPlan = state.plans[dateKey(today)] || {};
  const gs = (todayPlan.globalStatus && todayPlan.globalStatus[emp]) || '';
  const statusLabel = gs==='absent'?'Abwesend':gs==='school'?'Schule':gs==='half'?'Halbtags':'Anwesend';
  const statusCls = gs==='absent'?'absent':gs==='school'?'school':gs==='half'?'half':'working';
  document.getElementById('detailName').textContent = emp;
  document.getElementById('detailName').style.color = col;
  const sb = document.getElementById('detailStatus');
  sb.textContent = statusLabel; sb.className = 'status-badge ' + statusCls;

  let html = '';
  // Find the Monday of the current week
  const startOfWeek = new Date(today);
  const dow = today.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const daysToMonday = dow === 0 ? -6 : 1 - dow; // go back to Monday
  startOfWeek.setDate(today.getDate() + daysToMonday);

  for (let w = 0; w < 3; w++) {
    html += '<div class="week-label">Woche ' + (w+1) + '</div>';
    for (let dd = 0; dd < 7; dd++) {
      const dt = new Date(startOfWeek); dt.setDate(startOfWeek.getDate() + w*7 + dd);
      const k = dateKey(dt);
      const plan = state.plans[k] || { sites: [], globalStatus: {} };
      const isToday = k === dateKey(today);
      const empGs = (plan.globalStatus && plan.globalStatus[emp]) || '';
      let content = '', tag = '';
      if (empGs === 'absent') {
        content = '<div class="day-site" style="color:var(--text3)">Abwesend</div>';
        tag = '<div class="day-tag absent">ABS</div>';
      } else if (empGs === 'school') {
        content = '<div class="day-site" style="color:var(--blue)">Schule</div>';
        tag = '<div class="day-tag school">SCH</div>';
      } else {
        const sites = (plan.sites||[]).filter(s => s.assignments && s.assignments[emp]);
        if (sites.length > 0) {
          content = sites.map(s => {
            const vName = s.vehicle ? (state.vehicles[s.vehicle-1]||'') : '';
            const mark = s.assignments[emp];
            const tagCls = mark==='X1'?'x1':mark==='X2'?'x2':'full';
            const tagLbl = mark==='X1'?'VM':mark==='X2'?'NM':'';
            tag = tagLbl ? '<div class="day-tag ' + tagCls + '">' + tagLbl + '</div>' : '';
            return '<div class="day-site">' + s.name + '</div>' + (vName?'<div class="day-vehicle">🚐 ' + vName + '</div>':'');
          }).join('');
          if (empGs === 'half') tag = '<div class="day-tag half">HT</div>';
        } else if (empGs === 'half') {
          content = '<div class="day-site" style="color:var(--yellow)">Halbtags</div>';
          tag = '<div class="day-tag half">HT</div>';
        } else {
          content = '<div class="no-assignment">Kein Einsatz</div>';
        }
      }
      html += '<div class="day-row' + (isToday?' today-row':'') + '"><div class="day-date"><div class="day-dow">' + DAYS[dt.getDay()] + '</div><div class="day-num">' + dt.getDate() + '.</div></div><div class="day-content">' + content + '</div>' + tag + '</div>';
    }
  }
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('empDetail').classList.add('open');
  document.getElementById('empDetail').scrollTop = 0;
}

function closeDetail() { document.getElementById('empDetail').classList.remove('open'); }

let touchStartX = 0;
document.getElementById('empDetail').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('empDetail').addEventListener('touchend', e => {
  if (touchStartX < 40 && e.changedTouches[0].clientX - touchStartX > 60) closeDetail();
});
</script>
</body>
</html>
